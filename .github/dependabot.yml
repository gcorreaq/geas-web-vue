# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    assignees:
      - 'gcorreaq'
    allow:
      - dependency-type: 'direct'
    groups:
      # Group ESLint/Prettier packages together to avoid peer dependency conflicts
      linting:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@vue/eslint-config-*'
          - 'prettier'
      # Group TypeScript tooling together
      typescript:
        patterns:
          - 'typescript'
          - 'vue-tsc'
          - '@vue/tsconfig'
          - '@tsconfig/*'
          - '@types/*'
      # Group testing packages together
      testing:
        patterns:
          - 'vitest'
          - '@vue/test-utils'
          - 'jsdom'
      # Group Vite and its plugins together
      vite:
        patterns:
          - 'vite'
          - '@vitejs/*'
      # Group general build/workflow utilities together
      tooling:
        patterns:
          - 'husky'
          - 'lint-staged'
          - 'npm-run-all'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    assignees:
      - 'gcorreaq'
    groups:
      # Group all GitHub Actions together for a single review PR
      github-actions:
        patterns:
          - '*'
